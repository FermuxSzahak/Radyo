<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FermuxSzahak Radyo</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #00adb5;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00adb5;
        }
        p {
            color: #eeeeee;
            font-size: 14px;
            margin-bottom: 20px;
        }
        audio {
            width: 100%;
            margin-top: 15px;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
            width: 100%;
        }
        .btn:hover {
            background-color: #357ae8;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Radyo Logo">
    
    <h1>Müzik Çal, Eğlen!</h1>
    <p id="authStatus">Lütfen radyo oynatıcısına erişmek için giriş yapın.</p>

    <button id="loginBtn" class="btn">Google ile Giriş Yap</button>

    <div id="playerContainer" style="display: none;">
        <audio id="radyoPlayer" controls>
            <source src="sarki1.mp3" type="audio/mpeg">
            Tarayıcınız ses öğesini desteklemiyor.
        </audio>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // Firebase Yapılandırma Bilgilerin
  const firebaseConfig = {
    apiKey: "AIzaSyDfaYkfpb4CEEybshRcBh36qFyKgtMCIB4", // ⚠️ EKRANDA "..." İLE BİTTİĞİ İÇİN BURAYA EKRANINDAKİ TAM KEY'İ YAZMALISIN!
    authDomain: "radyoshow-d4af4.firebaseapp.com",
    databaseURL: "https://radyoshow-d4af4-default-rtdb.firebaseio.com",
    projectId: "radyoshow-d4af4",
    storageBucket: "radyoshow-d4af4.firebasestorage.app",
    messagingSenderId: "415134978742",
    appId: "1:415134978742:web:55bb6629a499107d050c17", // ⚠️ EKRANDA "..." İLE BİTTİĞİ İÇİN BURAYA EKRANINDAKİ TAM APP ID'YI YAZMALISIN!
    measurementId: "G-G7P932M03E"
  };

  // Firebase Başlatma
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("loginBtn");
  const authStatus = document.getElementById("authStatus");
  const playerContainer = document.getElementById("playerContainer");
  const radyoPlayer = document.getElementById("radyoPlayer");

  // Giriş ve Çıkış Buton Aksiyonu
  loginBtn.addEventListener("click", () => {
    if (auth.currentUser) {
        signOut(auth).then(() => {
            console.log("Çıkış yapıldı.");
        });
    } else {
        signInWithPopup(auth, provider)
          .then((result) => {
            console.log("Giriş Başarılı:", result.user.displayName);
          })
          .catch((error) => {
            console.error("Giriş Hatası:", error);
            alert("Giriş yapılırken hata oluştu: " + error.message);
          });
    }
  });

  // Oturum Durumu Değişikliklerini İzleme
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Giriş yapılmışsa
      authStatus.innerText = "Hoş geldin, " + user.displayName + "! Keyifli dinlemeler.";
      authStatus.style.color = "#00ff88";
      loginBtn.innerText = "Çıkış Yap";
      loginBtn.style.backgroundColor = "#d32f2f";
      playerContainer.style.display = "block"; 
    } else {
      // Çıkış yapılmışsa
      authStatus.innerText = "Lütfen radyo oynatıcısına erişmek için giriş yapın.";
      authStatus.style.color = "#eeeeee";
      loginBtn.innerText = "Google ile Giriş Yap";
      loginBtn.style.backgroundColor = "#4285F4";
      playerContainer.style.display = "none"; 
      radyoPlayer.pause(); 
    }
  });
</script>

</body>
</html>
