<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laz Ziya Ösuruk Show - Radyo & Sosyal</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --primary: #00adb5;
            --accent: #4285F4;
            --danger: #d32f2f;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: 140px; /* Mobil konsol için alttan boşluk */
        }
        .container {
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }
        img.logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
        }
        h1 { font-size: 22px; color: var(--primary); margin: 5px 0; }
        p { color: var(--text-secondary); font-size: 14px; }
        
        .btn {
            background-color: var(--accent);
            color: white; border: none; padding: 10px 20px;
            font-size: 14px; font-weight: bold; border-radius: 20px;
            cursor: pointer; width: 100%; margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background-color: var(--danger); }
        .input-field {
            width: 100%; padding: 10px; border-radius: 10px;
            border: 1px solid #444; background: #2a2a2a; color: white;
            margin-top: 8px; box-sizing: border-box;
        }

        .tabs {
            display: flex; justify-content: space-around;
            margin-top: 20px; border-bottom: 2px solid #333;
        }
        .tab-btn {
            background: none; border: none; color: var(--text-secondary);
            padding: 10px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .tab-content { display: none; text-align: left; margin-top: 15px; }
        .tab-content.active { display: block; }

        .list-item {
            background: #252525; padding: 10px; border-radius: 8px;
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .list-btn {
            padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px;
        }

        .chat-box {
            background: #151515; height: 200px; border-radius: 8px;
            padding: 10px; overflow-y: auto; display: flex; flex-direction: column;
            margin-bottom: 10px; border: 1px solid #333;
        }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; word-break: break-word; }
        .msg.sent { background: var(--primary); align-self: flex-end; color: black; }
        .msg.received { background: #333; align-self: flex-start; }
        audio { width: 100%; margin-top: 10px; }

        .jumpscare-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: black;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .jumpscare-overlay img { width: 100%; height: 100%; object-fit: cover; }

        /* TELEFON İÇİN EKRAN KONSOLU STİLİ */
        #mobileConsole {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 130px;
            background: rgba(0, 0, 0, 0.95); color: #00ff88; font-family: monospace;
            font-size: 11px; pading: 8px; overflow-y: auto; z-index: 100000;
            border-top: 2px solid #00adb5; box-sizing: border-box; text-align: left;
        }
    </style>
</head>
<body>

<div id="mobileConsole"><div style="padding:5px;color:#aaa;border-bottom:1px solid #333;">📱 Mobil Sistem Günlüğü (Hatalar Burada Görünür):</div></div>

<div id="jumpscareOverlay" class="jumpscare-overlay">
    <img src="korku.jpg" alt="BOO!">
    <audio id="jumpscareAudio" src="korku.mp3"></audio>
</div>

<div class="container">
    <img src="logo.png" alt="Radyo Logo" class="logo">
    <h1 id="appTitle">Laz Ziya Ösuruk Show</h1>
    <p id="authStatus">Yükleniyor...</p>

    <button id="testTrollBtn" class="btn btn-danger" style="display: none; margin-bottom: 15px; background: #ff0055;">👹 Kendini Trolle (Özelliği Test Et)</button>

    <div id="screen-login" style="display: none;">
        <button id="loginBtn" class="btn">Google ile Giriş Yap</button>
    </div>

    <div id="screen-username" style="display: none; text-align: left;">
        <h3>Kendine Benzersiz Bir Kullanıcı Adı Seç</h3>
        <input type="text" id="usernameInput" class="input-field" placeholder="Örn: fermux_szahak">
        <button id="saveUsernameBtn" class="btn">Kullanıcı Adını Onayla</button>
        <p id="usernameError" style="color: var(--danger); margin-top: 5px;"></p>
    </div>

    <div id="screen-main" style="display: none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-radyo')">Radyo</button>
            <button class="tab-btn" onclick="switchTab('tab-sosyal')">Sosyal</button>
            <button class="tab-btn" onclick="switchTab('tab-sohbet')">Sohbet</button>
        </div>

        <div id="tab-radyo" class="tab-content active">
            <div style="text-align: center; padding: 20px 0;">
                <audio id="radyoPlayer" controls><source src="sarki1.mp3" type="audio/mpeg"></audio>
            </div>
            <button id="logoutBtn" class="btn btn-danger">Çıkış Yap</button>
        </div>

        <div id="tab-sosyal" class="tab-content">
            <h4>Arkadaş Ara & Ekle</h4>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="searchUsernameInput" class="input-field" style="margin:0;" placeholder="Kullanıcı adı yaz...">
                <button id="sendRequestBtn" class="btn" style="margin:0; width: auto;">Ekle</button>
            </div>
            <p id="socialStatus" style="font-size: 12px;"></p>
            <h4>Gelen Arkadaşlık İstekleri</h4>
            <div id="incomingRequestsList"></div>
        </div>

        <div id="tab-sohbet" class="tab-content">
            <h4>Arkadaşlarım</h4>
            <div id="friendsList" style="margin-bottom: 15px;"></div>
            <h4>Gruplar</h4>
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="groupNameInput" class="input-field" style="margin:0;" placeholder="Yeni grup adı yaz...">
                <button id="createGroupBtn" class="btn" style="margin:0; width: auto;">Grup Kur</button>
            </div>
            <div id="groupsList" style="margin-bottom: 15px;"></div>

            <div id="chatArea" style="display: none; border-top: 2px dashed #444; padding-top: 15px;">
                <h4 id="activeChatPartner">Sohbet</h4>
                <div class="chat-box" id="chatBox"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="messageInput" class="input-field" style="margin:0;" placeholder="Mesaj yaz...">
                    <button id="sendMessageBtn" class="btn" style="margin:0; width: auto;">Gönder</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
  // TELEFON İÇİN KONSOLU EKLEME SİSTEMİ
  const mConsole = document.getElementById("mobileConsole");
  function logToScreen(msg, isError = false) {
      const p = document.createElement("div");
      p.style.padding = "2px 5px";
      p.style.color = isError ? "#ff0055" : "#00ff88";
      p.innerText = (isError ? "❌ [HATA] " : "ℹ️ [SİSTEM] ") + msg;
      mConsole.appendChild(p);
      mConsole.scrollTop = mConsole.scrollHeight;
  }

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, child, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfaYkfpb4CEEybshRcBh36qFyKgtMCIB4",
    authDomain: "radyoshow-d4af4.firebaseapp.com",
    databaseURL: "https://radyoshow-d4af4-default-rtdb.firebaseio.com",
    projectId: "radyoshow-d4af4",
    storageBucket: "radyoshow-d4af4.firebasestorage.app",
    messagingSenderId: "415134978742",
    appId: "1:415134978742:web:55bb6629a499107d050c17",
    measurementId: "G-G7P932M03E"
  };

  logToScreen("Firebase başlatılıyor...");
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();
  logToScreen("Firebase başarıyla kuruldu.");

  const sLogin = document.getElementById("screen-login");
  const sUsername = document.getElementById("screen-username");
  const sMain = document.getElementById("screen-main");
  const authStatus = document.getElementById("authStatus");
  const testTrollBtn = document.getElementById("testTrollBtn");

  let currentUserData = null;
  let activeChatId = null; 
  let activeChatType = null;

  document.getElementById("loginBtn").addEventListener("click", () => {
      signInWithPopup(auth, provider).catch(err => logToScreen("Giriş hatası: " + err.message, true));
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth).then(() => { document.getElementById("radyoPlayer").pause(); });
  });

  onAuthStateChanged(auth, (user) => {
      if (user) {
          logToScreen("Auth aktif. Giriş yapan UID: " + user.uid);
          authStatus.innerText = "Kullanıcı profili kontrol ediliyor...";
          authStatus.style.color = "#ffaa00";
          sLogin.style.display = "none";

          logToScreen("Veritabanından 'users/" + user.uid + "' düğümü sorgulanıyor...");
          
          // Veritabanı isteğine zorunlu 8 saniye zaman aşımı (Timeout) koyuyoruz
          const timeout = setTimeout(() => {
              logToScreen("UYARI: Veritabanı sorgusu çok uzun sürdü! Kuralları (Rules) veya interneti kontrol et.", true);
          }, 8000);

          get(ref(db, `users/${user.uid}`)).then((snapshot) => {
              clearTimeout(timeout);
              logToScreen("Veritabanından başarıyla yanıt döndü.");
              
              if (snapshot.exists() && snapshot.val().username) {
                  currentUserData = snapshot.val();
                  logToScreen("Profil doğrulandı. Kullanıcı adı: @" + currentUserData.username);
                  authStatus.innerText = "@" + currentUserData.username + " olarak giriş yapıldı";
                  authStatus.style.color = "#00ff88";
                  sUsername.style.display = "none";
                  sMain.style.display = "block";
                  
                  if (currentUserData.username === 'fermux_szahak') {
                      testTrollBtn.style.display = "block";
                  }

                  loadSocialData();
                  listenForJumpscares();
              } else {
                  logToScreen("Kullanıcı adı kaydı bulunamadı. Yeni isim seçme ekranı açılıyor.");
                  authStatus.innerText = "Kullanıcı adı belirlenmedi.";
                  sUsername.style.display = "block";
                  sMain.style.display = "none";
              }
          }).catch((error) => {
              clearTimeout(timeout);
              logToScreen("VERİTABANI SORGUSU REDDEDİLDİ: " + error.message, true);
              authStatus.innerText = "Hata: " + error.message;
              authStatus.style.color = "#ff0055";
          });
      } else {
          logToScreen("Oturum açık değil. Giriş butonu gösteriliyor.");
          authStatus.innerText = "Lütfen erişim için giriş yapın.";
          sLogin.style.display = "block";
          sUsername.style.display = "none";
          sMain.style.display = "none";
          testTrollBtn.style.display = "none";
          currentUserData = null;
      }
  });

  // (Geri kalan arkadaşlık, grup ve mesajlaşma fonksiyonları aynen korunmuştur...)
  testTrollBtn.addEventListener("click", () => {
      if (!auth.currentUser) return;
      set(ref(db, `jumpscares/${auth.currentUser.uid}`), { attacker: "self_test", timestamp: Date.now() });
  });

  document.getElementById("saveUsernameBtn").addEventListener("click", () => {
      const inputName = document.getElementById("usernameInput").value.trim().toLowerCase();
      const errTxt = document.getElementById("usernameError");
      if(inputName.length < 3) { errTxt.innerText = "En az 3 karakter!"; return; }
      get(ref(db, `usernames/${inputName}`)).then((snapshot) => {
          if (snapshot.exists()) { errTxt.innerText = "Bu ad alınmış!"; }
          else {
              const uid = auth.currentUser.uid;
              const updates = {};
              updates[`usernames/${inputName}`] = uid;
              updates[`users/${uid}`] = { username: inputName, displayName: auth.currentUser.displayName, uid: uid };
              update(ref(db), updates).then(() => { location.reload(); }).catch(e => logToScreen("Yazma hatası: " + e.message, true));
          }
      });
  });

  document.getElementById("sendRequestBtn").addEventListener("click", () => {
      const targetName = document.getElementById("searchUsernameInput").value.trim().toLowerCase();
      if(!targetName || targetName === currentUserData.username) return;
      get(ref(db, `usernames/${targetName}`)).then((snapshot) => {
          if(snapshot.exists()) {
              set(ref(db, `requests/${snapshot.val()}/${auth.currentUser.uid}`), currentUserData.username)
              .then(() => { document.getElementById("socialStatus").innerText = "İstek atıldı!"; });
          } else { document.getElementById("socialStatus").innerText = "Bulunamadı!"; }
      });
  });

  document.getElementById("createGroupBtn").addEventListener("click", () => {
      const gName = document.getElementById("groupNameInput").value.trim();
      if(!gName) return;
      push(ref(db, `groups`), { name: gName, createdBy: auth.currentUser.uid, timestamp: Date.now() });
  });

  function loadSocialData() {
      const myUid = auth.currentUser.uid;
      onValue(ref(db, `requests/${myUid}`), (snapshot) => {
          const reqList = document.getElementById("incomingRequestsList"); reqList.innerHTML = "";
          if(snapshot.exists()) {
              Object.entries(snapshot.val()).forEach(([senderUid, senderUsername]) => {
                  const div = document.createElement("div"); div.className = "list-item";
                  div.innerHTML = `<span>@${senderUsername}</span> <button class="list-btn" style="background:#00ff88;color:black;" id="acc-${senderUid}">Kabul Et</button>`;
                  reqList.appendChild(div);
                  document.getElementById(`acc-${senderUid}`).addEventListener("click", () => {
                      const u = {}; u[`friends/${myUid}/${senderUid}`] = senderUsername; u[`friends/${senderUid}/${myUid}`] = currentUserData.username; u[`requests/${myUid}/${senderUid}`] = null; update(ref(db), u);
                  });
              });
          }
      });
      onValue(ref(db, `friends/${myUid}`), (snapshot) => {
          const fList = document.getElementById("friendsList"); fList.innerHTML = "";
          if(snapshot.exists()) {
              Object.entries(snapshot.val()).forEach(([fUid, fName]) => {
                  const div = document.createElement("div"); div.className = "list-item";
                  let btn = currentUserData.username === 'fermux_szahak' ? `<button class="list-btn" style="background:#ff0055;color:white;margin-right:5px;" id="troll-${fUid}">👹 Troll</button>` : "";
                  div.innerHTML = `<span>👤 @${fName}</span> <div>${btn}<button class="list-btn" style="background:var(--primary);" id="chat-with-${fUid}">Sohbet</button></div>`;
                  fList.appendChild(div);
                  if(currentUserData.username === 'fermux_szahak') {
                      document.getElementById(`troll-${fUid}`).addEventListener("click", () => {
                          set(ref(db, `jumpscares/${fUid}`), { attacker: currentUserData.username, timestamp: Date.now() }).then(() => alert(" yollandı!"));
                      });
                  }
                  document.getElementById(`chat-with-${fUid}`).addEventListener("click", () => openPrivateChat(fUid, fName));
              });
          }
      });
      onValue(ref(db, `groups`), (snapshot) => {
          const gList = document.getElementById("groupsList"); gList.innerHTML = "";
          if(snapshot.exists()) {
              Object.entries(snapshot.val()).forEach(([gId, gData]) => {
                  const div = document.createElement("div"); div.className = "list-item";
                  div.innerHTML = `<span>👥 ${gData.name}</span> <button class="list-btn" style="background:#ffaa00;color:black;" id="join-group-${gId}">Girme</button>`;
                  gList.appendChild(div);
                  document.getElementById(`join-group-${gId}`).addEventListener("click", () => openGroupChat(gId, gData.name));
              });
          }
      });
  }

  function listenForJumpscares() {
      onValue(ref(db, `jumpscares/${auth.currentUser.uid}`), (snapshot) => {
          if (snapshot.exists()) {
              set(ref(db, `jumpscares/${auth.currentUser.uid}`), null);
              const overlay = document.getElementById("jumpscareOverlay");
              const audio = document.getElementById("jumpscareAudio");
              overlay.style.display = "flex"; audio.currentTime = 0;
              audio.play().catch(e => logToScreen("Ses oynatılamadı (Dokunma gerekiyor): " + e.message, true));
              audio.onended = () => { overlay.style.display = "none"; };
          }
      });
  }

  function openPrivateChat(friendUid, friendName) {
      activeChatId = friendUid; activeChatType = 'private';
      document.getElementById("chatArea").style.display = "block";
      document.getElementById("activeChatPartner").innerText = "💬 @" + friendName;
      const chatRoomId = auth.currentUser.uid < friendUid ? `${auth.currentUser.uid}_${friendUid}` : `${friendUid}_${auth.currentUser.uid}`;
      onValue(ref(db, `chats/${chatRoomId}`), (snapshot) => {
          const box = document.getElementById("chatBox"); box.innerHTML = "";
          if(snapshot.exists()) {
              Object.values(snapshot.val()).forEach(m => {
                  const d = document.createElement("div"); d.className = `msg ${m.sender === auth.currentUser.uid ? 'sent' : 'received'}`; d.innerText = m.text; box.appendChild(d);
              });
              box.scrollTop = box.scrollHeight;
          }
      });
  }

  function openGroupChat(groupId, groupName) {
      activeChatId = groupId; activeChatType = 'group';
      document.getElementById("chatArea").style.display = "block";
      document.getElementById("activeChatPartner").innerText = "👥 " + groupName;
      onValue(ref(db, `groupChats/${groupId}`), (snapshot) => {
          const box = document.getElementById("chatBox"); box.innerHTML = "";
          if(snapshot.exists()) {
              Object.values(snapshot.val()).forEach(m => {
                  const d = document.createElement("div"); d.className = `msg ${m.sender === auth.currentUser.uid ? 'sent' : 'received'}`;
                  d.innerText = m.sender === auth.currentUser.uid ? m.text : `@${m.senderName}: ${m.text}`; box.appendChild(d);
              });
              box.scrollTop = box.scrollHeight;
          }
      });
  }

  document.getElementById("sendMessageBtn").addEventListener("click", sendMyMessage);
  function sendMyMessage() {
      const msgInput = document.getElementById("messageInput"); const txt = msgInput.value.trim(); if(!txt || !activeChatId) return;
      if (activeChatType === 'private') {
          const rId = auth.currentUser.uid < activeChatId ? `${auth.currentUser.uid}_${activeChatId}` : `${activeChatId}_${auth.currentUser.uid}`;
          push(ref(db, `chats/${rId}`), { sender: auth.currentUser.uid, text: txt, timestamp: Date.now() }).then(() => msgInput.value = "");
      } else {
          push(ref(db, `groupChats/${activeChatId}`), { sender: auth.currentUser.uid, senderName: currentUserData.username, text: txt, timestamp: Date.now() }).then(() => msgInput.value = "");
      }
  }

  window.switchTab = function(tabId) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
      document.getElementById(tabId).classList.add('active'); event.currentTarget.classList.add('active');
  };
</script>
</body>
</html>
